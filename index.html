<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>云工坊</title>
  <meta name="description" content="云工坊，专注工业智造、精密工艺与智能赋能，打造专业高效的工业制造服务平台。" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #f3f5f7;
      --panel: #ffffff;
      --line: rgba(20,30,40,0.12);
      --text: #1e2429;
      --muted: #6f7881;
      --max: 1160px;
    }

    html, body {
      font-family: "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      background: linear-gradient(180deg, #f7f8fa 0%, #eef1f4 100%);
      color: var(--text);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .wrap {
      width: calc(100% - 40px);
      max-width: var(--max);
      margin: 0 auto;
    }

    header {
      border-bottom: 1px solid var(--line);
      background: rgba(255,255,255,0.72);
      backdrop-filter: blur(8px);
    }

    .top {
      height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .brand {
      font-size: 18px;
      font-weight: 600;
      letter-spacing: 1px;
    }

    .site {
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 0.5px;
    }

    .hero {
      min-height: calc(100vh - 72px);
      display: flex;
      align-items: center;
    }

    .hero-inner {
      width: 100%;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 320px;
      gap: 48px;
      align-items: end;
      padding: 72px 0;
    }

    .label {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 18px;
    }

    h1 {
      font-size: clamp(48px, 9vw, 118px);
      line-height: 0.95;
      font-weight: 600;
      letter-spacing: -3px;
    }

    .line {
      width: 72px;
      height: 1px;
      background: rgba(20,30,40,0.28);
      margin: 28px 0 24px;
    }

    .desc {
      max-width: 420px;
      font-size: 16px;
      color: var(--muted);
    }

    .side {
      border-left: 1px solid var(--line);
      padding-left: 28px;
      background: rgba(255,255,255,0.36);
      padding-top: 8px;
      padding-bottom: 8px;
      display: grid;
      gap: 22px;
    }

    .item small {
      display: block;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .item strong {
      display: block;
      font-size: 18px;
      font-weight: 500;
    }

    .bottom {
      border-top: 1px solid var(--line);
      padding: 18px 0 28px;
      background: rgba(255,255,255,0.45);
    }

    .bottom-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 13px;
    }

    @media (max-width: 860px) {
      .hero-inner {
        grid-template-columns: 1fr;
        gap: 36px;
        align-items: start;
      }

      .side {
        border-left: 0;
        border-top: 1px solid var(--line);
        padding-left: 0;
        padding-top: 24px;
        grid-template-columns: repeat(3, 1fr);
      }
    }

    @media (max-width: 640px) {
      .wrap {
        width: calc(100% - 28px);
      }

      .top {
        height: auto;
        padding: 20px 0;
        gap: 6px;
        flex-direction: column;
        align-items: flex-start;
      }

      .hero {
        min-height: auto;
      }

      .hero-inner {
        padding: 56px 0 64px;
      }

      h1 {
        letter-spacing: -1.5px;
      }

      .side {
        grid-template-columns: 1fr;
        gap: 18px;
      }

      .desc {
        font-size: 15px;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="wrap top">
      <div class="brand" style="font-size:22px;letter-spacing:2px;">云工坊</div>
      <div class="site">www.yungongfang.com</div>
    </div>
  </header>

  <main class="hero">
    <div class="wrap hero-inner">
      <section>
        <div class="label">YUNGONGFANG</div>
        <h1>云工坊</h1>
        <div class="line"></div>
        <p class="desc">工业智造 · 精密工艺 · 智能赋能</p>
      </section>

      <aside class="side">
        <div class="item">
          <small>品牌</small>
          <strong>云工坊</strong>
        </div>
        <div class="item">
          <small>定位</small>
          <strong>工业制造</strong>
        </div>
        <div class="item">
          <small>域名</small>
          <strong>yungongfang.com</strong>
        </div>
        <div class="item">
          <small>邮箱</small>
          <strong><a href="mailto:lianxi@yungongfang.com">lianxi@yungongfang.com</a></strong>
        </div>
      </aside>
    </div>
  </main>

  <footer class="bottom">
    <div class="wrap bottom-inner">
      <span>©2026 云工坊 版权所有</span>
      <span><a href="mailto:lianxi@yungongfang.com">lianxi@yungongfang.com</a></span>
      <span>工业制造</span>
    </div>
  </footer>
</body>
</html>
